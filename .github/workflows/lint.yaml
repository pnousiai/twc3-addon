name: Lint

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
    - cron: "0 0 * * *"

jobs:
  find:
    name: Find apps
    runs-on: ubuntu-latest
    outputs:
      addons: ${{ steps.addons.outputs.addons_list }}
    steps:
      - name: ⤵️ Check out code from GitHub
        uses: actions/checkout@v6.0.2

      - name: 🔍 Find app directories
        id: addons
        shell: bash
        run: |
          declare -a addons
          declare -a addons_list

          for config in $(find ./ -maxdepth 2 \( -name config.json -o -name config.yaml -o -name config.yml \)); do
            addon_dir=$(dirname "$config")
            addon_dir=${addon_dir#./}
            [[ "${addon_dir}" == "" ]] && addon_dir="."
            addons+=("${addon_dir}")
          done

          addons=($(printf '%s\n' "${addons[@]}" | sort -u))
          json_list=$(printf '"%s",' "${addons[@]}")
          json_list="[${json_list%,}]"

          echo "Found addons: ${addons[@]}"
          echo "addons=${addons[@]}" >> "$GITHUB_OUTPUT"
          echo "addons_list=[${json_list}]" >> "$GITHUB_OUTPUT"

  lint:
    name: Lint app ${{ matrix.path }}
    runs-on: ubuntu-latest
    needs: find
    strategy:
      matrix:
        path: ${{ fromJson(needs.find.outputs.addons) }}
    steps:
      - name: ⤵️ Check out code from GitHub
        uses: actions/checkout@v6.0.2

      - name: 🚀 Run Home Assistant App Lint
        uses: frenck/action-addon-linter@v2.21
        with:
          path: "${{ matrix.path }}"
